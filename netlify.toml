[build]
  publish = "."

# Sécurité + cache HTML (1h)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache CSS/JS — longue durée (1 an, immutable)
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images (1 an)
[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Sitemap
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/xml; charset=UTF-8"

# Pretty URLs : les canonicals sans .html fonctionnent sans redirect visible
[[redirects]]
  from = "/blog/*"
  to = "/blog/:splat.html"
  status = 200
  force = false

[[redirects]]
  from = "/secteurs/*"
  to = "/secteurs/:splat.html"
  status = 200
  force = false
